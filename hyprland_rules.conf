# Hyprland Window Rules for ASUS Dial GUI
# Add these to your ~/.config/hypr/hyprland.conf

# Remove decorations, borders, and shadows from the dial GUI
windowrulev2 = noborder, class:(dial_gui)
windowrulev2 = noshadow, class:(dial_gui)
windowrulev2 = noblur, class:(dial_gui)
windowrulev2 = opaque, class:(dial_gui)
windowrulev2 = float, class:(dial_gui)
windowrulev2 = pin, class:(dial_gui)
windowrulev2 = stayfocused, class:(dial_gui)

# Alternative: Match by title if class doesn't work
windowrulev2 = noborder, title:(Dial Menu)
windowrulev2 = noshadow, title:(Dial Menu)
windowrulev2 = noblur, title:(Dial Menu)
windowrulev2 = opaque, title:(Dial Menu)
windowrulev2 = float, title:(Dial Menu)
windowrulev2 = pin, title:(Dial Menu)

# Apply these rules
# Then reload Hyprland: hyprctl reload
